id: ai.opencode.opencode
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: OpenCode
rename-desktop-file: OpenCode.desktop
rename-icon: OpenCode

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=home
  - --filesystem=/media
  - --filesystem=/mnt
  - --filesystem=/run/media

modules:
  - name: opencode
    buildsystem: simple
    build-options:
      no-debuginfo: true
    build-commands:
      - ar x opencode-desktop-linux*.deb
      - tar xf data.tar.gz
      - mv usr/* /app
    sources:
      - type: file
        only-arches: [x86_64]
        url: https://github.com/anomalyco/opencode/releases/download/v1.14.22/opencode-desktop-linux-amd64.deb
        sha256: 0bb181c626884add12e47d5b8d2f88c1cba5bd50a742797a4180242e67dae27c
        x-checker-data:
          type: json
          url: https://api.github.com/repos/anomalyco/opencode/releases/latest
          version-query: .tag_name | sub("^v"; "")
          url-query: .assets[] | select(.name=="opencode-desktop-linux-amd64.deb")
            | .browser_download_url
      - type: file
        only-arches: [aarch64]
        url: https://github.com/anomalyco/opencode/releases/download/v1.14.22/opencode-desktop-linux-arm64.deb
        sha256: 64e23ee5be5911344f4009d71abd141fe650e5eb24acf0d3ebfc84c89d4beae0
        x-checker-data:
          type: json
          url: https://api.github.com/repos/anomalyco/opencode/releases/latest
          version-query: .tag_name | sub("^v"; "")
          url-query: .assets[] | select(.name=="opencode-desktop-linux-arm64.deb")
            | .browser_download_url
