id: ai.opencode.opencode
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: OpenCode
rename-desktop-file: OpenCode.desktop
rename-icon: OpenCode

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=home
  - --filesystem=/media
  - --filesystem=/mnt
  - --filesystem=/run/media

modules:
  - name: git
    cleanup:
      - /share
    make-args:
      - NO_PERL=1
      - NO_TCLTK=1
    make-install-args:
      - INSTALL_SYMLINKS=1
      - NO_PERL=1
      - NO_TCLTK=1
    sources:
      - type: archive
        url: https://www.kernel.org/pub/software/scm/git/git-2.54.0.tar.gz
        sha256: 45e8107643a44e3ce46f5665beb35af3932fb0d70017687905ab5d4e3aafa8eb
        x-checker-data:
          type: anitya
          project-id: 5350
          url-template: https://www.kernel.org/pub/software/scm/git/git-$version.tar.gz

  - name: opencode
    buildsystem: simple
    build-options:
      no-debuginfo: true
    build-commands:
      - ar x opencode-desktop-linux*.deb
      - tar xf data.tar.gz
      - mv usr/bin/* /app/bin
      - mv usr/share/* /app/share
    sources:
      - type: file
        only-arches: [x86_64]
        url: https://github.com/anomalyco/opencode/releases/download/v1.14.31/opencode-desktop-linux-amd64.deb
        sha256: d8a81ef86cffdbeef5a6bcc8a4c313c3a92aa8c0fcd807ee230a98f7f0152a63
        x-checker-data:
          type: json
          url: https://api.github.com/repos/anomalyco/opencode/releases/latest
          version-query: .tag_name | sub("^v"; "")
          url-query: .assets[] | select(.name=="opencode-desktop-linux-amd64.deb")
            | .browser_download_url
      - type: file
        only-arches: [aarch64]
        url: https://github.com/anomalyco/opencode/releases/download/v1.14.31/opencode-desktop-linux-arm64.deb
        sha256: ae5f5758e0e6f85e26b0f3e52a30460468c02bc6c3bb22883c7a51d6cb6bedbe
        x-checker-data:
          type: json
          url: https://api.github.com/repos/anomalyco/opencode/releases/latest
          version-query: .tag_name | sub("^v"; "")
          url-query: .assets[] | select(.name=="opencode-desktop-linux-arm64.deb")
            | .browser_download_url
