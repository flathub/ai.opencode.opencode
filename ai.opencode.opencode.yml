id: ai.opencode.opencode
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: OpenCode
rename-desktop-file: OpenCode.desktop
rename-icon: OpenCode

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=home
  - --filesystem=/media
  - --filesystem=/mnt
  - --filesystem=/run/media

modules:
  - name: opencode
    buildsystem: simple
    build-options:
      no-debuginfo: true
    build-commands:
      - ar x opencode-desktop-linux*.deb
      - tar xf data.tar.gz
      - mv usr/* /app
    sources:
      - type: file
        only-arches: [x86_64]
        url: https://github.com/anomalyco/opencode/releases/download/v1.14.25/opencode-desktop-linux-amd64.deb
        sha256: 0ec97587a5cb51873a6962392778a8bca2dc943355adfdb816151088cbe2614d
        x-checker-data:
          type: json
          url: https://api.github.com/repos/anomalyco/opencode/releases/latest
          version-query: .tag_name | sub("^v"; "")
          url-query: .assets[] | select(.name=="opencode-desktop-linux-amd64.deb")
            | .browser_download_url
      - type: file
        only-arches: [aarch64]
        url: https://github.com/anomalyco/opencode/releases/download/v1.14.25/opencode-desktop-linux-arm64.deb
        sha256: 2d53143d0ff046e3a640d8b9ace36a7fd9eb37fdf7bffa44bab80913d4e0e51a
        x-checker-data:
          type: json
          url: https://api.github.com/repos/anomalyco/opencode/releases/latest
          version-query: .tag_name | sub("^v"; "")
          url-query: .assets[] | select(.name=="opencode-desktop-linux-arm64.deb")
            | .browser_download_url
